<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wdd330_final-project | Phones</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="../js/products.js" type="module"></script>
  </head>
  <body>
    <header class="main-header" id="main-header"></header>
    <main class="main-phones" id="main-phones">
      <div class="filters-container">
        <h2 class="filters-title">Filters</h2>
        <form id="filters-form">
            
            <div class="filter-group">
                <label for="filter-brand">Brand</label>
                <select id="filter-brand" name="brand">
                    <option value="">Select Brand</option>
                    <option value="apple">Apple</option>
                    <option value="samsung">Samsung</option>
                    <option value="dell">Motorola</option>
                    <option value="lenovo">Xiaomi</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filter-year">Release Year</label>
                <select id="filter-year" name="year">
                    <option value="">Select Year</option>
                    <option value="2026">2026</option>
                    <option value="2025">2025</option>
                    <option value="2024">2024</option>
                    <option value="2023">2023</option>
                </select>
            </div>

            <div class="filter-group">
                <span class="filter-label">Price Range</span>
                <div class="price-inputs">
                    <div class="input-wrapper">
                        <label for="price-min" class="sr-only">Min Price</label>
                        <input type="number" id="price-min" name="minPrice" placeholder="Min" min="0">
                    </div>
                    <span class="price-separator">-</span>
                    <div class="input-wrapper">
                        <label for="price-max" class="sr-only">Max Price</label>
                        <input type="number" id="price-max" name="maxPrice" placeholder="Max" min="0">
                    </div>
                </div>
            </div>

            <button type="reset" id="btn-clear-filters" class="btn-secondary">Clear Filters</button>
        </form>
      </div>

    </main>
    <h1>Phones</h1>
    <footer class="footer" id="main-footer"></footer>
  </body>
</html>
