<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wdd330_final-project | Phones</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="../js/product.js" type="module"></script>
  </head>
  <body>
    <header class="main-header" id="main-header"></header>
      <div class="filters-container">
        <h2 class="filters-title">Filters</h2>
        <form id="filters-form">
            
            <div class="filter-group">
                <label for="filter-brand">Brand</label>
                <select id="filter-brand" name="brand">
                    <option value="">Select Brand</option>
                    <option value="Apple smartphones">Apple</option>
                    <option value="Samsung smartphones">Samsung</option>
                    <option value="Motorola smartphones">Motorola</option>
                    <option value="Xiaomi smartphones">Xiaomi</option>
                    <option value="Honor smartphones">Honor</option>
                </select>
            </div>

            <div class="filter-group">
                <span class="filter-label">Price Range</span>
                <div class="price-inputs">
                    <div class="input-wrapper">
                        <label for="price-min" class="sr-only">Min Price</label>
                        <input type="number" id="price-min" name="minPrice" placeholder="Min" min="0">
                    </div>
                    <span class="price-separator">-</span>
                    <div class="input-wrapper">
                        <label for="price-max" class="sr-only">Max Price</label>
                        <input type="number" id="price-max" name="maxPrice" placeholder="Max" min="0">
                    </div>
                </div>
            </div>

            <button type="reset" id="btn-clear-filters" class="btn-secondary">Clear Filters</button>
        </form>
      </div>

    <main class="main-home" id="main-home"></main>
    <footer class="footer" id="main-footer"></footer>
  </body>
</html>
